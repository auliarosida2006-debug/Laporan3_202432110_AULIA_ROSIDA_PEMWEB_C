<!DOCTYPE html>

<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Nilai</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="kalkulator.css">

</head>
<body>

<nav class="navbar">

<div class="logo">
    portofolio mahasiswa ITPLN
</div>

<<ul class="menu">
    <li><a href="index.html">Tentang Saya</a></li>
    <li><a href="kalkulator.html" class="active">Kalkulator Nilai</a></li>
    <li><a href="matkul.php">Info Mata Kuliah</a></li>
</ul>

</nav>

<div class="container">

<div id="welcome" class="welcome-box">
</div>

<div class="calculator-card">

    <div class="calculator-header">
        <h2>Kalkulator Nilai Akhir</h2>
    </div>

    <div class="bobot-wrapper">

        <div class="bobot-box">
            <h4>Tugas</h4>
            <p>30%</p>
        </div>

        <div class="bobot-box">
            <h4>UTS</h4>
            <p>30%</p>
        </div>

        <div class="bobot-box">
            <h4>UAS</h4>
            <p>40%</p>
        </div>

    </div>

    <label>Nilai Tugas</label>
    <input
        type="number"
        id="tugas"
        placeholder="Contoh: 85"
    >

    <label>Nilai UTS</label>
    <input
        type="number"
        id="uts"
        placeholder="Contoh: 80"
    >

    <label>Nilai UAS</label>
    <input
        type="number"
        id="uas"
        placeholder="Contoh: 90"
    >

    <button id="btnHitung">
        Hitung Nilai
    </button>

    <div id="error" class="error-box">
    </div>

    <div id="hasil" class="hasil-box">

        <h3>Hasil Perhitungan</h3>

        <p>
            Nilai Akhir :
            <span id="nilaiAkhir"></span>
        </p>

        <p>
            Grade :
            <span id="grade"></span>
        </p>

    </div>

</div>

</div>

<script src="kalkulator.js"></script>

</body>
</html>
